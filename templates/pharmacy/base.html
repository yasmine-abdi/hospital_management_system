{% extends 'dashboard.html' %}
{% load static %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<style>
    /* Reset Bootstrap styles that conflict with dashboard */
    .page-content { padding: 30px; }
    .hms-card {
        background: white; border-radius: 12px; border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding: 25px;
    }
    .hms-breadcrumb { font-size: 13px; color: #64748b; margin-bottom: 20px; display: flex; align-items: center; gap: 6px;}
    .hms-breadcrumb span { display: flex; align-items: center; gap: 4px; }
    .hms-breadcrumb .active { color: #0d47a1; font-weight: 600; }
    .form-control:focus, .form-select:focus { box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1); border-color: #90caf9; }
    .input-group-text { border-color: #dee2e6; }
    .form-control, .form-select { border-color: #dee2e6; }
    a { text-decoration: none; }
</style>
{% endblock %}

{% block content %}
    {% block pharmacy_content %}{% endblock %}
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
